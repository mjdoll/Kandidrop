<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#07070f" />
    <meta name="description" content="KandiDrop — every bead has a story." />
    <title>KandiDrop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { background: #07070f; color: #fff; font-family: 'IBM Plex Mono', monospace; overflow-x: hidden; }
      ::placeholder { color: #2a2a3a !important; }
      @keyframes kdPulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
      @keyframes kdFloat {
        0%,100% { transform:translate(0,0); }
        25% { transform:translate(8px,-18px); }
        50% { transform:translate(-4px,-30px); }
        75% { transform:translate(12px,-12px); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.5s ease forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
